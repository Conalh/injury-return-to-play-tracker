name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - goal-*

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-tests:
    name: Backend tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install API dependencies
        working-directory: services/api
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -e '.[dev]'
      - name: Run API tests
        working-directory: services/api
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m pytest

  migration-head:
    name: Migration head check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install API dependencies
        working-directory: services/api
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -e '.[dev]'
      - name: Check Alembic migration heads
        working-directory: services/api
        shell: pwsh
        run: .\.venv\Scripts\alembic.exe heads

  postgres-integration:
    name: Postgres integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: return_play
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RETURN_PLAY_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/return_play
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install API dependencies
        working-directory: services/api
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[dev]'
      - name: Apply migrations to Postgres
        working-directory: services/api
        run: .venv/bin/alembic upgrade head
      - name: Run Postgres-backed integration tests
        working-directory: services/api
        run: .venv/bin/python -m pytest tests/test_postgres_integration.py -v

  web-build:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Build Next.js app
        working-directory: apps/web
        run: npm run build

  web-playwright:
    name: Web Playwright
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install API dependencies
        working-directory: services/api
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -e '.[dev]'
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Install browser
        working-directory: apps/web
        run: npx playwright install chromium
      - name: Run browser workflow tests
        working-directory: apps/web
        run: npm test

  docker-compose-build:
    name: Docker compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose -f compose.yml config
      - name: Build API and web images
        run: docker compose -f compose.yml build api web

  backup-restore-drill:
    name: Backup restore drill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Postgres restore drill
        shell: pwsh
        run: ./scripts/backup/restore-drill.ps1

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Block high severity web advisories
        working-directory: apps/web
        run: npm audit --audit-level=high
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Python audit tooling
        working-directory: services/api
        run: |
          python -m pip install -e '.[dev]'
          python -m pip install pip-audit
          python -m pip freeze --exclude-editable > audit-requirements.txt
      - name: Block known vulnerable API dependencies
        working-directory: services/api
        run: pip-audit --strict -r audit-requirements.txt
